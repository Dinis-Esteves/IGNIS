syntax = "proto3";
option go_package = "ignis/common/proto";

service IgnisService {
  rpc Greet(GreetRequest)               returns (GreetResponse);
  rpc Subscribe(SubscribeRequest)       returns (stream JobAssignment);
  rpc Unsubscribe(UnsubscribeRequest)   returns (UnsubscribeResponse);
  rpc Job(JobRequest)                   returns (JobResponse);
  rpc SubmitResult(SubmitResultRequest) returns (SubmitResultResponse);
  rpc GetResult(GetResultRequest)       returns (GetResultResponse);
}

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;

  // Audio
  SPEECH_RECOGNITION             = 1;
  AUDIO_CLASSIFICATION           = 2;
  TEXT_TO_SPEECH                 = 3;
  TEXT_TO_AUDIO                  = 4;
  KEYWORD_SPOTTING               = 5;
  ZERO_SHOT_AUDIO_CLASSIFICATION = 6;

  // NLP
  TEXT_INFERENCE          = 10;
  SUMMARIZATION           = 11;
  TRANSLATION             = 12;
  QUESTION_ANSWERING      = 13;
  TEXT_CLASSIFICATION     = 14;
  FILL_MASK               = 15;
  TOKEN_CLASSIFICATION    = 16;
  ZERO_SHOT_CLASSIFICATION = 17;
  TABLE_QUESTION_ANSWERING = 18;
  FEATURE_EXTRACTION      = 19;

  // Computer Vision
  IMAGE_CLASSIFICATION          = 20;
  OBJECT_DETECTION              = 21;
  IMAGE_CAPTIONING              = 22;
  DEPTH_ESTIMATION              = 23;
  VIDEO_CLASSIFICATION          = 24;
  IMAGE_SEGMENTATION            = 25;
  ZERO_SHOT_IMAGE_CLASSIFICATION = 26;
  ZERO_SHOT_OBJECT_DETECTION    = 27;
  MASK_GENERATION               = 28;
  IMAGE_FEATURE_EXTRACTION      = 29;
  KEYPOINT_MATCHING             = 30;

  // Multimodal
  VISUAL_QA        = 40;
  DOCUMENT_QA      = 41;
  IMAGE_TEXT_TO_TEXT = 42;
  ANY_TO_ANY       = 43;
}

message GreetRequest {
  string sender  = 1;
  string message = 2;
}

message GreetResponse {
  string reply = 1;
}

message SubscribeRequest {
  string sender = 1;
}

message SubscribeResponse {
  string workerId = 1;
}

message UnsubscribeRequest {
  string workerId = 1;
}

message UnsubscribeResponse {
  string ack = 1;
}

message JobAssignment {
  string   jobId      = 1;
  string   modelName  = 2;
  string   inputData  = 3;
  TaskType taskType   = 4;
  string   config     = 5;
  bytes    inputBytes = 6;
}

message JobRequest {
  TaskType tasktype    = 1;
  string   modelName   = 2;
  string   inputData   = 3;
  string   config      = 4;
  bytes    inputBytes  = 5;
}

message JobResponse {
  string jobId = 1;
}

message SubmitResultRequest {
  string jobId  = 1;
  string output = 2;
}

message SubmitResultResponse {
  string ack = 1;
}

message GetResultRequest {
  string jobId = 1;
}

message GetResultResponse {
  bool   ready  = 1;
  string output = 2;
}

